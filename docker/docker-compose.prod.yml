services:
  nginx:
    image: nginx:alpine
    container_name: visioryx-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf
      - frontend-dist:/usr/share/nginx/html
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - visioryx-net

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: visioryx-backend
    env_file:
      - ../backend/.env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/visioryx
      DATABASE_URL_SYNC: postgresql://postgres:postgres@db:5432/visioryx
      CORS_ORIGINS: https://visionaryx.forgetechno.com,https://api.visionaryx.forgetechno.com
      PUBLIC_DASHBOARD_URL: https://visionaryx.forgetechno.com
      PUBLIC_API_URL: https://api.visionaryx.forgetechno.com
    volumes:
      - backend-storage:/app/storage
      - backend-models:/app/models
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - visioryx-net

  frontend-builder:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        EXPO_PUBLIC_API_URL: https://api.visionaryx.forgetechno.com
    container_name: visioryx-frontend-builder
    volumes:
      - frontend-dist:/app/dist
    networks:
      - visioryx-net

  db:
    image: postgres:16-alpine
    container_name: visioryx-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: visioryx
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - visioryx-net

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: visioryx-mediamtx
    ports:
      - "8554:8554"
      - "1935:1935"
      - "8888:8888"
      - "8889:8889"
      - "8890:8890"
    environment:
      - MTX_PROTOCOLS=tcp
      - MTX_WEBRTC=yes
      - MTX_WEBRTCADDRESS=:8889
    volumes:
      - ./mediamtx.yml:/mediamtx.yml
    restart: unless-stopped
    networks:
      - visioryx-net

volumes:
  pgdata:
  frontend-dist:
  backend-storage:
  backend-models:

networks:
  visioryx-net:
    driver: bridge
