# Visioryx - Docker Compose
# AI Powered Real-Time Face Recognition & Surveillance System

services:
  db:
    image: postgres:16-alpine
    container_name: visioryx-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: visioryx
    volumes:
      - visioryx_pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"  # Host 5433 to avoid conflict with local PostgreSQL on 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: visioryx-backend
    env_file:
      - ../backend/.env.docker
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/visioryx
      DATABASE_URL_SYNC: postgresql://postgres:postgres@db:5432/visioryx
    ports:
      - "8000:8000"
    volumes:
      - ../backend/storage:/app/storage
      - ../backend/models:/app/models
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_WS_URL: ws://localhost:8000
    container_name: visioryx-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: visioryx-mediamtx
    ports:
      - "8554:8554" # RTSP
      - "1935:1935" # RTMP
      - "8888:8888" # HLS
      - "8889:8889" # WebRTC
      - "8890:8890" # SRT
    environment:
      - MTX_PROTOCOLS=tcp
      - MTX_WEBRTC=yes
      - MTX_WEBRTCADDRESS=:8889
      - MTX_WEBRTCICEUDP=yes
      - MTX_WEBRTCICEUDPSERVERPORT=19000
    volumes:
      - ./mediamtx.yml:/mediamtx.yml
    # Add UDP port range for WebRTC if needed, but for local/testing host mode or single port often works
    # ports:
    #   - "19000:19000/udp"

volumes:
  visioryx_pgdata:
